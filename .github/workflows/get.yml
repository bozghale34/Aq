name: Get deb

on:
  workflow_dispatch:

jobs:
  get:
    runs-on: ubuntu-latest
    steps:
      - run: wget https://packages.termux.org/apt/termux-main/pool/main/o/openssl-tool/openssl-tool_3.4.0-1_aarch64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: mydeb
          path: openssl-tool_*.deb
