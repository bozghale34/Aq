name: Get deb

on:
  workflow_dispatch:

jobs:
  get:
    runs-on: ubuntu-latest
    steps:
      - name: Download openssl for aarch64
        run: wget https://packages.termux.org/apt/termux-main/pool/main/o/openssl/openssl_3.4.0-1_aarch64.deb -O openssl.deb
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mydeb
          path: openssl.deb
